<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      // Keep UI always visible
      AFRAME.registerComponent('always-on-top', {
        init: function () {
          this.el.addEventListener('object3dset', () => {
            const mesh = this.el.getObject3D('mesh');
            if (!mesh) return;

            mesh.traverse(node => {
              if (node.isMesh) {
                node.material.depthTest = false;
                node.material.depthWrite = false;
              }
            });
          });
        }
      });

      AFRAME.registerComponent('proximity-dial-system', {
        init: function () {
          this.p1 = new THREE.Vector3();
          this.p2 = new THREE.Vector3();
          this.active = false;
        },

        setOpacity: function (mesh, opacity) {
          mesh.traverse((node) => {
            if (node.isMesh) {
              node.material.transparent = true;
              node.material.opacity = opacity;
              node.material.depthWrite = false;
            }
          });
        },

        tick: function () {
          const dial = document.querySelector('#marker-dial');
          const stairMarker = document.querySelector('#marker-stair');
          const stair = document.querySelector('#stairModel');
          const debugText = document.querySelector('#debugText');

          // default text
          if (debugText) {
            debugText.setAttribute('value', 'no markers');
          }

          if (dial && stairMarker && stair) {

            if (dial.object3D.visible && stairMarker.object3D.visible) {

              dial.object3D.updateMatrixWorld();
              stairMarker.object3D.updateMatrixWorld();

              dial.object3D.getWorldPosition(this.p1);
              stairMarker.object3D.getWorldPosition(this.p2);

              const distance = this.p1.distanceTo(this.p2);

              // ✅ always update text
              if (debugText) {
                debugText.setAttribute('value', distance.toFixed(2));
              }

              // stable activation (based on your real range)
              if (distance < 3.3) {
                this.active = true;
              } else if (distance > 3.8) {
                this.active = false;
              }

              const mesh = stair.getObject3D('mesh');

              if (mesh) {
                // transparency
                this.setOpacity(mesh, this.active ? 0.7 : 0.3);

                if (this.active) {
                  // rotation → angle
                  let vector = new THREE.Vector3(0, 0, 1);
                  vector.applyQuaternion(dial.object3D.quaternion);

                  let angle = Math.atan2(vector.x, vector.z) * (180 / Math.PI);
                  angle = (angle + 360) % 360;

                  // 4-step color switching
                  mesh.traverse((node) => {
                    if (node.isMesh) {
                      if (angle >= 315 || angle < 45) node.material.color.set('#FFFFFF');
                      else if (angle >= 45 && angle < 135) node.material.color.set('#1976D2');
                      else if (angle >= 135 && angle < 225) node.material.color.set('#FF00FF');
                      else node.material.color.set('#444444');
                    }
                  });
                } else {
                  // reset color
                  mesh.traverse((node) => {
                    if (node.isMesh) {
                      node.material.color.set('#FFFFFF');
                    }
                  });
                }
              }
            }
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;"
      proximity-dial-system
    >

      <!-- LIGHT -->
      <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 4 2"></a-entity>

      <!-- STAIR -->
      <a-marker id="marker-stair" type="pattern" url="pattern-connect.patt">
        <a-entity id="stairModel" gltf-model="url(stair.glb)" scale="12 12 12"></a-entity>
      </a-marker>

      <!-- DIAL -->
      <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
        <a-box position="0 0 -0.5" scale="0.1 0.1 0.5" color="red"></a-box>
        <a-circle rotation="-90 0 0" radius="0.6" color="#CCC" opacity="0.2"></a-circle>
      </a-marker>

      <!-- CAMERA + SIMPLE NUMBER -->
      <a-entity camera>

        <a-text 
          id="debugText"
          position="0 0 -1"
          color="white"
          align="center"
          width="1.5"
          value="0.00"
          always-on-top>
        </a-text>

      </a-entity>

    </a-scene>
  </body>
</html>
