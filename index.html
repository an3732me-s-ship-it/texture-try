<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('final-proximity-switcher', {
        init: function() {
          this.loader = new THREE.TextureLoader();
          this.p1 = new THREE.Vector3();
          this.p2 = new THREE.Vector3();
        },

        tick: function () {
          const mDial = document.querySelector('#marker-dial');
          const mStair = document.querySelector('#marker-stair');
          const targets = document.querySelectorAll('.swappable');

          if (mDial && mStair && mDial.object3D.visible && mStair.object3D.visible) {
            // LESSON FROM YOUR TEST: Update matrices for real-time accuracy
            mDial.object3D.updateMatrixWorld();
            mStair.object3D.updateMatrixWorld();
            mDial.object3D.getWorldPosition(this.p1);
            mStair.object3D.getWorldPosition(this.p2);
            
            const distance = this.p1.distanceTo(this.p2);

            // Using 0.25 (25cm) first to ensure it works. 
            // Once it works, you can lower this to 0.1 for "closer".
            if (distance < 0.25) {
              var vector = new THREE.Vector3(0, 0, 1);
              vector.applyQuaternion(mDial.object3D.quaternion);
              let angle = Math.atan2(vector.x, vector.z) * (180 / Math.PI);
              angle = (angle + 360) % 360;

              let path;
              if (angle >= 315 || angle < 45) path = 'textures/plaster_diffuse.jpg';
              else if (angle >= 45 && angle < 135) path = 'textures/metal_diffuse.jpg';
              else if (angle >= 135 && angle < 225) path = 'textures/wood_diffuse.jpg';
              else path = 'textures/brick_diffuse.jpg';

              this.applyTexture(targets, path, true);
              return;
            }
          }
          this.applyTexture(targets, null, false);
        },

        applyTexture: function(targets, path, isActive) {
          targets.forEach(el => {
            const mesh = el.getObject3D('mesh');
            if (!mesh) return;

            mesh.traverse((node) => {
              if (node.isMesh) {
                if (isActive) {
                  if (node.userData.currentPath !== path) {
                    this.loader.load(path, (texture) => {
                      texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                      texture.repeat.set(4, 4);
                      // Force a new standard material to override GLTF settings
                      node.material = new THREE.MeshStandardMaterial({
                        map: texture,
                        color: '#FFFFFF',
                        roughness: 0.6
                      });
                      node.userData.currentPath = path;
                    });
                  }
                } else {
                  // RESET TO BRIGHT WHITE
                  if (node.userData.currentPath !== 'neutral') {
                    node.material = new THREE.MeshStandardMaterial({
                      color: '#FFFFFF',
                      roughness: 0.3
                    });
                    node.userData.currentPath = 'neutral';
                  }
                }
              }
            });
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" final-proximity-switcher>
      
      <a-assets>
        <img id="tex-wood" src="textures/wood_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-plaster" src="textures/plaster_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-metal" src="textures/metal_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-brick" src="textures/brick_diffuse.jpg" crossorigin="anonymous">
      </a-assets>

      <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8; position: 1 4 2;"></a-entity>

      <a-marker id="marker-stair" type="pattern" url="pattern-connect.patt">
        <a-entity id="stairModel" class="swappable" gltf-model="url(stair.glb)" scale="12 12 12"></a-entity>
      </a-marker>

      <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
        <a-box position="0 0 -0.5" scale="0.1 0.1 0.5" color="red"></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
