<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('four-color-proximity', {
        init: function () {
          this.p1 = new THREE.Vector3();
          this.p2 = new THREE.Vector3();
          this.active = false;
        },

        tick: function () {
          const dial = document.querySelector('#marker-dial');
          const stairMarker = document.querySelector('#marker-stair');
          const stair = document.querySelector('#stairModel');

          if (
            dial && stairMarker &&
            dial.object3D.visible &&
            stairMarker.object3D.visible &&
            stair
          ) {
            // 👉 get world positions
            dial.object3D.updateMatrixWorld();
            stairMarker.object3D.updateMatrixWorld();

            dial.object3D.getWorldPosition(this.p1);
            stairMarker.object3D.getWorldPosition(this.p2);

            const distance = this.p1.distanceTo(this.p2);

            // 👉 proximity condition (closer than before)
            if (distance < 0.35) {
              this.active = true;

              // ===== YOUR ORIGINAL WORKING LOGIC =====
              var vector = new THREE.Vector3(0, 0, 1);
              vector.applyQuaternion(dial.object3D.quaternion);

              let angle = Math.atan2(vector.x, vector.z) * (180 / Math.PI);
              angle = (angle + 360) % 360;

              const mesh = stair.getObject3D('mesh');
              if (mesh) {
                mesh.traverse((node) => {
                  if (node.isMesh) {
                    if (angle >= 315 || angle < 45) node.material.color.set('#FFFFFF');
                    else if (angle >= 45 && angle < 135) node.material.color.set('#1976D2');
                    else if (angle >= 135 && angle < 225) node.material.color.set('#FF00FF');
                    else node.material.color.set('#444444');
                  }
                });
              }

              return;
            }
          }

          // 👉 reset when not close
          if (this.active) {
            const stair = document.querySelector('#stairModel');
            const mesh = stair?.getObject3D('mesh');

            if (mesh) {
              mesh.traverse((node) => {
                if (node.isMesh) {
                  node.material.color.set('#FFFFFF');
                }
              });
            }

            this.active = false;
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" four-color-proximity>
      
      <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 4 2"></a-entity>

      <!-- 👇 IMPORTANT: give this marker an ID -->
      <a-marker id="marker-stair" type="pattern" url="pattern-connect.patt">
        <a-entity id="stairModel" gltf-model="url(stair.glb)" scale="12 12 12"></a-entity>
      </a-marker>

      <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
        <a-box position="0 0 -0.5" scale="0.1 0.1 0.5" color="red"></a-box>
        <a-circle rotation="-90 0 0" radius="0.6" color="#CCC" opacity="0.2"></a-circle>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
