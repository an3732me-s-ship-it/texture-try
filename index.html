<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
  AFRAME.registerComponent('texture-manager', {
    init: function() {
      // Create a loader to handle the images manually
      this.loader = new THREE.TextureLoader();
      console.log("Texture Manager Ready");
    },

    tick: function () {
      const dial = document.querySelector('#marker-dial');
      const targets = document.querySelectorAll('.swappable');

      // 1. Check if dial is visible
      if (dial && dial.object3D.visible) {
        let rotY = THREE.MathUtils.radToDeg(dial.object3D.rotation.y);
        let angle = ((rotY % 360) + 360) % 360;

        // 2. Decide the file path
        let texturePath;
        if (angle >= 300 || angle < 60) {
          texturePath = 'textures/plaster_diffuse.jpg';
        } else if (angle >= 60 && angle < 180) {
          texturePath = 'textures/metal_diffuse.jpg';
        } else {
          texturePath = 'textures/wood_diffuse.jpg';
        }

        // 3. Apply to all targets
        targets.forEach(el => {
          const mesh = el.getObject3D('mesh');
          if (mesh) {
            mesh.traverse((node) => {
              if (node.isMesh) {
                // Only update if the texture path actually changed
                if (!node.userData.currentPath || node.userData.currentPath !== texturePath) {
                  
                  // Manually load the texture
                  this.loader.load(texturePath, (texture) => {
                    texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                    texture.repeat.set(2, 2); 
                    
                    node.material = new THREE.MeshStandardMaterial({
                      map: texture,
                      color: 0xffffff
                    });
                    
                    node.userData.currentPath = texturePath;
                    console.log("Applied texture: " + texturePath);
                  });
                }
              }
            });
          }
        });
      }
    }
  });
</script>

<body style="margin: 0px; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" texture-manager>
    
    <a-assets>
      <img id="tex-wood" src="textures/wood_diffuse.jpg" crossorigin="anonymous">
      <img id="tex-plaster" src="textures/plaster_diffuse.jpg" crossorigin="anonymous">
      <img id="tex-metal" src="textures/metal_diffuse.jpg" crossorigin="anonymous">
    </a-assets>

   <a-entity light="type: ambient; intensity: 0.5;"></a-entity>
      <a-entity light="type: directional; 
                 intensity: 0.8; 
                 position: 1 4 2; 
                 castShadow: true;">
      </a-entity>

    <a-marker type="pattern" url="pattern-connect.patt">
      <a-entity id="stairModel" class="swappable" gltf-model="url(stair.glb)" scale="10 10 10" position="0 0 0"></a-entity>
    </a-marker>

     <a-marker type="pattern" url="pattern-boundary.patt">
      <a-entity id="wallModel" class="swappable" gltf-model="url(wall.glb)" scale="10 10 10" position="0 0 0"></a-entity>
    </a-marker>

    <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
      <a-box position="0 0 -0.5" scale="0.1 0.1 0.5" color="red"></a-box>
    </a-marker>
   

    <a-entity camera></a-entity>
  </a-scene>
</body>
