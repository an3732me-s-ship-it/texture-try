<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('proximity-texture-switch', {
        init: function () {
          this.p1 = new THREE.Vector3();
          this.p2 = new THREE.Vector3();
          this.active = false;

          // ✅ preload textures ONCE
          const loader = new THREE.TextureLoader();

          this.textures = {
            plaster: loader.load('textures/plaster_diffuse.jpg'),
            metal: loader.load('textures/metal_diffuse.jpg'),
            wood: loader.load('textures/wood_diffuse.jpg'),
            brick: loader.load('textures/brick_diffuse.jpg')
          };

          // optional tiling
          Object.values(this.textures).forEach(tex => {
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(2, 2);
          });

          this.currentState = null;
        },

        tick: function () {
          const dial = document.querySelector('#marker-dial');
          const stairMarker = document.querySelector('#marker-stair');
          const stair = document.querySelector('#stairModel');

          if (
            dial && stairMarker &&
            dial.object3D.visible &&
            stairMarker.object3D.visible &&
            stair
          ) {
            dial.object3D.updateMatrixWorld();
            stairMarker.object3D.updateMatrixWorld();

            dial.object3D.getWorldPosition(this.p1);
            stairMarker.object3D.getWorldPosition(this.p2);

            const distance = this.p1.distanceTo(this.p2);

            // ✅ correct range (your calibrated values)
            if (distance < 3.3) {
              this.active = true;
            } else if (distance > 3.8) {
              this.active = false;
            }

            const mesh = stair.getObject3D('mesh');
            if (!mesh) return;

            if (!this.active) {
              // reset texture
              if (this.currentState !== 'neutral') {
                mesh.traverse(node => {
                  if (node.isMesh) {
                    node.material.map = null;
                    node.material.needsUpdate = true;
                  }
                });
                this.currentState = 'neutral';
              }
              return;
            }

            // 🔁 get dial angle
            let vector = new THREE.Vector3(0, 0, 1);
            vector.applyQuaternion(dial.object3D.quaternion);

            let angle = Math.atan2(vector.x, vector.z) * (180 / Math.PI);
            angle = (angle + 360) % 360;

            // 🎯 choose texture
            let state;
            if (angle >= 315 || angle < 45) state = 'plaster';
            else if (angle >= 45 && angle < 135) state = 'metal';
            else if (angle >= 135 && angle < 225) state = 'wood';
            else state = 'brick';

            // ✅ only update if changed
            if (state !== this.currentState) {
              mesh.traverse(node => {
                if (node.isMesh) {
                  node.material.map = this.textures[state];
                  node.material.needsUpdate = true;
                }
              });

              this.currentState = state;
            }
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      proximity-texture-switch
    >

      <!-- LIGHT -->
      <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 4 2"></a-entity>

      <!-- STAIR -->
      <a-marker id="marker-stair" type="pattern" url="pattern-connect.patt">
        <a-entity id="stairModel" gltf-model="url(stair.glb)" scale="12 12 12"></a-entity>
      </a-marker>

      <!-- DIAL -->
      <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
        <a-box position="0 0 -0.5" scale="0.1 0.1 0.5" color="red"></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
