<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('master-proximity-switcher', {
        init: function() {
          this.loader = new THREE.TextureLoader();
          this.dialPos = new THREE.Vector3();
          this.stairPos = new THREE.Vector3();
        },

        tick: function () {
          const dial = document.querySelector('#marker-dial');
          const stairMarker = document.querySelector('#marker-stair');
          const targets = document.querySelectorAll('.swappable');

          if (dial && dial.object3D.visible && stairMarker && stairMarker.object3D.visible) {
            
            dial.object3D.getWorldPosition(this.dialPos);
            stairMarker.object3D.getWorldPosition(this.stairPos);
            
            const dist = this.dialPos.distanceTo(this.stairPos);

            // BACK TO 0.25 (25cm) for stability with 5cm markers
            if (dist < 0.15) {
              var vector = new THREE.Vector3(0, 0, 1);
              vector.applyQuaternion(dial.object3D.quaternion);
              let angle = Math.atan2(vector.x, vector.z) * (180 / Math.PI);
              angle = (angle + 360) % 360;

              let path;
              if (angle >= 315 || angle < 45) path = 'textures/plaster_diffuse.jpg';
              else if (angle >= 45 && angle < 135) path = 'textures/metal_diffuse.jpg';
              else if (angle >= 135 && angle < 225) path = 'textures/wood_diffuse.jpg';
              else path = 'textures/brick_diffuse.jpg';

              this.applyMaterial(targets, path, true);
              return;
            }
          }
          // Default: Markers missing or too far
          this.applyMaterial(targets, null, false);
        },

        applyMaterial: function(targets, path, isActive) {
          targets.forEach(el => {
            const mesh = el.getObject3D('mesh');
            if (!mesh) return;

            mesh.traverse((node) => {
              if (node.isMesh) {
                if (isActive) {
                  // APPLY TEXTURE STATE
                  if (node.userData.currentPath !== path) {
                    this.loader.load(path, (texture) => {
                      texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                      texture.repeat.set(4, 4);
                      
                      // Create a clean material that accepts light
                      node.material = new THREE.MeshStandardMaterial({
                        map: texture,
                        color: '#FFFFFF',
                        roughness: 0.6,
                        metalness: path.includes('metal') ? 0.7 : 0.1,
                        side: THREE.DoubleSide
                      });
                      
                      node.userData.currentPath = path;
                      node.material.needsUpdate = true;
                      console.log("Texture Active: " + path);
                    });
                  }
                } else {
                  // RESET TO BRIGHT ARCHITECTURAL WHITE
                  if (node.userData.currentPath !== 'neutral') {
                    node.material = new THREE.MeshStandardMaterial({
                      color: '#FFFFFF',
                      map: null,
                      roughness: 0.4, // Lower roughness = more highlight/shadow definition
                      metalness: 0.0,
                      side: THREE.DoubleSide
                    });
                    node.userData.currentPath = 'neutral';
                    node.material.needsUpdate = true;
                    console.log("Resetting to Neutral White");
                  }
                }
              }
            });
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" master-proximity-switcher>
      
      <a-assets>
        <img id="tex-wood" src="textures/wood_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-plaster" src="textures/plaster_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-metal" src="textures/metal_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-brick" src="textures/brick_diffuse.jpg" crossorigin="anonymous">
      </a-assets>

      <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
      <a-entity light="type: directional; intensity: 0.9; position: 2 4 2;"></a-entity>

      <a-marker id="marker-stair" type="pattern" url="pattern-connect.patt">
        <a-entity id="stairModel" class="swappable" gltf-model="url(stair.glb)" scale="12 12 12" position="0 0 0"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-boundary.patt">
        <a-entity id="wallModel" class="swappable" gltf-model="url(wall.glb)" scale="12 12 12" position="0 0 0"></a-entity>
      </a-marker>

      <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
        <a-box position="0 0 -0.5" scale="0.1 0.1 0.5" color="red"></a-box>
        <a-circle rotation="-90 0 0" radius="0.6" color="#CCC" opacity="0.2"></a-circle>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
