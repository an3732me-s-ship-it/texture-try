<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('proximity-color-switcher', {
        init: function() {
          this.p1 = new THREE.Vector3();
          this.p2 = new THREE.Vector3();
          console.log("Color Proximity Engine Ready");
        },

        tick: function () {
          const mDial = document.querySelector('#marker-dial');
          const mStair = document.querySelector('#marker-stair');
          const targets = document.querySelectorAll('.swappable');

          // If both markers are seen...
          if (mDial && mStair && mDial.object3D.visible && mStair.object3D.visible) {
            
            // Sync the 3D math
            mDial.object3D.updateMatrixWorld();
            mStair.object3D.updateMatrixWorld();
            mDial.object3D.getWorldPosition(this.p1);
            mStair.object3D.getWorldPosition(this.p2);
            
            const distance = this.p1.distanceTo(this.p2);

            // Using 0.25 for a stable connection
            if (distance < 0.25) {
              var vector = new THREE.Vector3(0, 0, 1);
              vector.applyQuaternion(mDial.object3D.quaternion);
              let angle = Math.atan2(vector.x, vector.z) * (180 / Math.PI);
              angle = (angle + 360) % 360;

              // Determine Color
              let activeColor;
              if (angle >= 315 || angle < 45) activeColor = '#FFFFFF'; // White
              else if (angle >= 45 && angle < 135) activeColor = '#1976D2'; // Blue
              else if (angle >= 135 && angle < 225) activeColor = '#FF00FF'; // Pink
              else activeColor = '#444444'; // Grey

              this.updateColors(targets, activeColor);
              return;
            }
          }
          // Default: If markers are apart, stay White
          this.updateColors(targets, '#FFFFFF');
        },

        updateColors: function(targets, color) {
          targets.forEach(el => {
            const mesh = el.getObject3D('mesh');
            if (mesh) {
              mesh.traverse((node) => {
                if (node.isMesh) {
                  // We ONLY change the color, keeping the original material's shadows
                  node.material.color.set(color);
                }
              });
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" proximity-color-switcher>
      
      <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
      <a-entity light="type: directional; intensity: 0.9; position: 1 4 2;"></a-entity>

      <a-marker id="marker-stair" type="pattern" url="pattern-connect.patt">
        <a-entity id="stairModel" class="swappable" gltf-model="url(stair.glb)" scale="12 12 12"></a-entity>
      </a-marker>

      <a-marker id="marker-wall" type="pattern" url="pattern-boundary.patt">
        <a-entity id="wallModel" class="swappable" gltf-model="url(wall.glb)" scale="12 12 12"></a-entity>
      </a-marker>

      <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
        <a-box position="0 0.1 0" scale="0.1 0.5 0.1" color="red"></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
