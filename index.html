<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('texture-manager', {
        init: function() {
          this.loader = new THREE.TextureLoader();
          console.log("Blender Model Tester: Active");
        },

        tick: function () {
          const dial = document.querySelector('#marker-dial');
          const targets = document.querySelectorAll('.swappable');

          if (dial && dial.object3D.visible) {
            let rotY = THREE.MathUtils.radToDeg(dial.object3D.rotation.y);
            let angle = ((rotY % 360) + 360) % 360;

            // Determine texture path
            let path;
            if (angle >= 300 || angle < 60) path = 'textures/plaster_diffuse.jpg';
            else if (angle >= 60 && angle < 180) path = 'textures/metal_diffuse.jpg';
            else path = 'textures/wood_diffuse.jpg';

            targets.forEach(el => {
              const meshObj = el.getObject3D('mesh');
              if (meshObj) {
                meshObj.traverse((node) => {
                  if (node.isMesh) {
                    // Only update if the path changed to prevent flickering
                    if (node.userData.currentPath !== path) {
                      this.loader.load(path, (texture) => {
                        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                        // Blender 'Smart UV Project' usually needs a higher repeat
                        texture.repeat.set(4, 4); 
                        
                        node.material.map = texture;
                        node.material.color.set('#FFFFFF');
                        node.material.needsUpdate = true;
                        
                        node.userData.currentPath = path;
                        console.log(`Updated ${node.name || 'mesh'} to ${path}`);
                      });
                    }
                  }
                });
              }
            });
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" texture-manager>
      
      <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
      <a-entity light="type: directional; intensity: 0.6;" position="1 4 2"></a-entity>

      <a-marker type="pattern" url="pattern-connect.patt">
        <a-entity id="stairModel" 
                  class="swappable" 
                  gltf-model="url(stair.glb)" 
                  scale="1 1 1" 
                  position="0 0 0">
        </a-entity>
        
        <a-box id="testBox" class="swappable" position="1.2 0.25 0" scale="0.5 0.5 0.5"></a-box>
      </a-marker>

      <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
        <a-box position="0 0.1 0" scale="0.1 0.5 0.1" color="red"></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
