<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('hybrid-texture-master', {
        init: function() {
          this.loader = new THREE.TextureLoader();
          console.log("Hybrid Texture System Active");
        },

        tick: function () {
          const dial = document.querySelector('#marker-dial');
          const targets = document.querySelectorAll('.swappable');

          if (dial && dial.object3D.visible) {
            // 1. USE YOUR SMOOTH MATH
            var vector = new THREE.Vector3( 0, 0, 1 );
            vector.applyQuaternion( dial.object3D.quaternion );
            let angle = Math.atan2(vector.x, vector.z) * (180 / Math.PI);
            angle = (angle + 360) % 360;

            // 2. LOGIC FOR TEXTURES
            let texturePath;
            if (angle >= 300 || angle < 60) texturePath = 'textures/plaster_diffuse.jpg';
            else if (angle >= 60 && angle < 180) texturePath = 'textures/metal_diffuse.jpg';
            else texturePath = 'textures/wood_diffuse.jpg';

            this.updateModels(targets, texturePath, true);
          } else {
            // 3. RESET TO WHITE IF DIAL IS HIDDEN
            this.updateModels(targets, null, false);
          }
        },

        updateModels: function(targets, path, isActive) {
          targets.forEach(el => {
            const meshObj = el.getObject3D('mesh');
            if (meshObj) {
              meshObj.traverse((node) => {
                if (node.isMesh) {
                  if (isActive) {
                    // Update only if path changed
                    if (node.userData.currentPath !== path) {
                      this.loader.load(path, (texture) => {
                        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                        texture.repeat.set(4, 4); 
                        
                        // We modify the EXISTING material to keep the nice shading
                        node.material.map = texture;
                        node.material.color.set('#FFFFFF');
                        node.material.needsUpdate = true;
                        
                        node.userData.currentPath = path;
                        console.log("Smooth Swap: " + path);
                      });
                    }
                  } else {
                    // Reset to neutral white
                    if (node.userData.currentPath !== 'neutral') {
                      node.material.map = null;
                      node.material.color.set('#FFFFFF');
                      node.material.needsUpdate = true;
                      node.userData.currentPath = 'neutral';
                    }
                  }
                }
              });
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" hybrid-texture-master>
      
      <a-assets>
        <img id="tex-wood" src="textures/wood_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-plaster" src="textures/plaster_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-metal" src="textures/metal_diffuse.jpg" crossorigin="anonymous">
      </a-assets>

      <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 4 2"></a-entity>

      <a-marker type="pattern" url="pattern-connect.patt">
        <a-entity id="stairModel" class="swappable" gltf-model="url(stair.glb)" scale="12 12 12" position="0 0 0"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-boundary.patt">
        <a-entity id="wallModel" class="swappable" gltf-model="url(wall.glb)" scale="12 12 12" position="0 0 0"></a-entity>
      </a-marker>

      <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
        <a-box position="0 0 -0.5" scale="0.1 0.1 0.5" color="red"></a-box>
        <a-circle rotation="-90 0 0" radius="0.6" color="#CCC" opacity="0.2"></a-circle>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
