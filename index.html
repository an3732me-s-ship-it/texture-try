<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('cube-texture-dial', {
        tick: function () {
          const dial = document.querySelector('#marker-dial');
          const cube = document.querySelector('#testCube');

          if (dial && dial.object3D.visible && cube) {
            // 1. Get rotation
            let rotY = THREE.MathUtils.radToDeg(dial.object3D.rotation.y);
            let angle = ((rotY % 360) + 360) % 360;

            // 2. Select texture path based on angle
            let targetTexture;
            if (angle >= 300 || angle < 60) {
              targetTexture = 'textures/plaster_diffuse.jpg';
            } else if (angle >= 60 && angle < 180) {
              targetTexture = 'textures/metal_diffuse.jpg';
            } else {
              targetTexture = 'textures/wood_diffuse.jpg';
            }

            // 3. Apply texture to the cube using A-Frame's setAttribute
            // We check the current src to prevent unnecessary refreshes
            let currentSrc = cube.getAttribute('material').src;
            if (currentSrc !== targetTexture) {
              cube.setAttribute('material', {
                src: targetTexture,
                color: '#FFFFFF'
              });
            }
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" cube-texture-dial>
      
      <a-assets>
        <img id="tex-wood" src="textures/wood_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-plaster" src="textures/plaster_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-metal" src="textures/metal_diffuse.jpg" crossorigin="anonymous">
      </a-assets>

      <a-entity light="type: ambient; intensity: 0.9;"></a-entity>

      <a-marker type="pattern" url="pattern-connect.patt">
        <a-box id="testCube" position="0 0.5 0" scale="1 1 1" material="color: white"></a-box>
      </a-marker>

      <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
        <a-box position="0 0 -0.5" scale="0.1 0.1 0.5" color="red"></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
