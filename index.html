<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('stable-proximity-textures', {
  init: function() {
    this.loader = new THREE.TextureLoader();
    // Reusable vectors to save memory/processing
    this.p1 = new THREE.Vector3();
    this.p2 = new THREE.Vector3();
    console.log("Proximity Engine: Stabilized");
  },

  tick: function () {
    const dialMarker = document.querySelector('#marker-dial');
    const stairMarker = document.querySelector('#marker-stair');
    const targets = document.querySelectorAll('.swappable');

    // Check visibility
    if (dialMarker && stairMarker && dialMarker.object3D.visible && stairMarker.object3D.visible) {
      
      // LESSON 1: Force the update so math is never 'laggy'
      dialMarker.object3D.updateMatrixWorld();
      stairMarker.object3D.updateMatrixWorld();

      // LESSON 2: Use World Positions for absolute accuracy
      dialMarker.object3D.getWorldPosition(this.p1);
      stairMarker.object3D.getWorldPosition(this.p2);
      
      const distance = this.p1.distanceTo(this.p2);

      // Your requested range (0.15 = 15cm, change to 0.08 for "side-by-side")
      if (distance < 0.15) {
        
        // Use the smooth Vector logic for the dial rotation
        var vector = new THREE.Vector3(0, 0, 1);
        vector.applyQuaternion(dialMarker.object3D.quaternion);
        let angle = Math.atan2(vector.x, vector.z) * (180 / Math.PI);
        angle = (angle + 360) % 360;

        let path;
        if (angle >= 315 || angle < 45) path = 'textures/plaster_diffuse.jpg';
        else if (angle >= 45 && angle < 135) path = 'textures/metal_diffuse.jpg';
        else if (angle >= 135 && angle < 225) path = 'textures/wood_diffuse.jpg';
        else path = 'textures/brick_diffuse.jpg';

        this.applyTexture(targets, path, true);
        return; 
      }
    }
    
    // If not visible OR out of range
    this.applyTexture(targets, null, false);
  },

  applyTexture: function(targets, path, isActive) {
    targets.forEach(el => {
      const mesh = el.getObject3D('mesh');
      if (!mesh) return;
      mesh.traverse((node) => {
        if (node.isMesh) {
          if (isActive) {
            if (node.userData.currentPath !== path) {
              this.loader.load(path, (texture) => {
                texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(4, 4);
                node.material.map = texture;
                node.material.color.set('#FFFFFF');
                node.material.needsUpdate = true;
                node.userData.currentPath = path;
              });
            }
          } else {
            // Reset to Bright Neutral
            if (node.userData.currentPath !== 'neutral') {
              node.material.map = null;
              node.material.color.set('#FFFFFF');
              node.material.needsUpdate = true;
              node.userData.currentPath = 'neutral';
            }
          }
        }
      });
    });
  }
});
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" four-texture-master>
      
      <a-assets>
        <img id="tex-wood" src="textures/wood_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-plaster" src="textures/plaster_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-metal" src="textures/metal_diffuse.jpg" crossorigin="anonymous">
        <img id="tex-brick" src="textures/brick_diffuse.jpg" crossorigin="anonymous">
      </a-assets>

      <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 4 2"></a-entity>

      <a-marker type="pattern" url="pattern-connect.patt">
        <a-entity id="stairModel" class="swappable" gltf-model="url(stair.glb)" scale="12 12 12"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="pattern-boundary.patt">
        <a-entity id="wallModel" class="swappable" gltf-model="url(wall.glb)" scale="12 12 12"></a-entity>
      </a-marker>

      <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
        <a-box position="0 0 -0.5" scale="0.1 0.1 0.5" color="red"></a-box>
        <a-circle rotation="-90 0 0" radius="0.6" color="#CCC" opacity="0.2"></a-circle>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
