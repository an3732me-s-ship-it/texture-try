<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
 AFRAME.registerComponent('texture-manager', {
  init: function() {
    this.loader = new THREE.TextureLoader();
    console.log("Proximity System Active for 5cm markers");
  },

  tick: function () {
    const dialMarker = document.querySelector('#marker-dial');
    const connectMarker = document.querySelector('#marker-connect'); 
    const targets = document.querySelectorAll('.swappable');

    if (!dialMarker || !connectMarker) return;

    // 1. Calculate 3D distance
    const dialPos = new THREE.Vector3();
    const connectPos = new THREE.Vector3();
    
    dialMarker.object3D.getWorldPosition(dialPos);
    connectMarker.object3D.getWorldPosition(connectPos);
    
    const distance = dialPos.distanceTo(connectPos);

    // 2. Interaction Zone: 0.25 = 25cm. 
    // Since your markers are 5cm, this is a "hand-width" away.
    const interactionZone = 0.25; 

    if (dialMarker.object3D.visible && distance < interactionZone) {
      let rotY = THREE.MathUtils.radToDeg(dialMarker.object3D.rotation.y);
      let angle = ((rotY % 360) + 360) % 360;

      let path;
      if (angle >= 300 || angle < 60) path = 'textures/plaster_diffuse.jpg';
      else if (angle >= 60 && angle < 180) path = 'textures/metal_diffuse.jpg';
      else path = 'textures/wood_diffuse.jpg';

      this.applyTexture(targets, path);
    } else {
      this.resetToDefault(targets);
    }
  },

  applyTexture: function(targets, path) {
    targets.forEach(el => {
      const obj = el.getObject3D('mesh');
      if (obj) {
        obj.traverse(node => {
          if (node.isMesh && node.userData.currentPath !== path) {
            this.loader.load(path, (texture) => {
              texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
              texture.repeat.set(4, 4); // Denser grain for small markers
              
              node.material = new THREE.MeshStandardMaterial({ 
                map: texture, 
                color: 0xffffff,
                roughness: 0.6,
                metalness: 0.2 
              });
              node.userData.currentPath = path;
              node.userData.isDefault = false;
            });
          }
        });
      }
    });
  },

  resetToDefault: function(targets) {
    targets.forEach(el => {
      const obj = el.getObject3D('mesh');
      if (obj) {
        obj.traverse(node => {
          if (node.isMesh && !node.userData.isDefault) {
            // Reverts to a nice "Architectural Grey"
            node.material = new THREE.MeshStandardMaterial({ 
              color: '#888888', 
              roughness: 0.9,
              map: null 
            });
            node.userData.currentPath = null;
            node.userData.isDefault = true;
          }
        });
      }
    });
  }
});
</script>

<body style="margin: 0px; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" texture-manager>
    
    <a-assets>
      <img id="tex-wood" src="textures/wood_diffuse.jpg" crossorigin="anonymous">
      <img id="tex-plaster" src="textures/plaster_diffuse.jpg" crossorigin="anonymous">
      <img id="tex-metal" src="textures/metal_diffuse.jpg" crossorigin="anonymous">
    </a-assets>

   <a-entity light="type: ambient; intensity: 0.5;"></a-entity>
      <a-entity light="type: directional; 
                 intensity: 0.8; 
                 position: 1 4 2; 
                 castShadow: true;">
      </a-entity>

    <a-marker type="pattern" url="pattern-connect.patt">
      <a-entity id="stairModel" class="swappable" gltf-model="url(stair.glb)" scale="10 10 10" position="0 0 0"></a-entity>
    </a-marker>

     <a-marker type="pattern" url="pattern-boundary.patt">
      <a-entity id="wallModel" class="swappable" gltf-model="url(wall.glb)" scale="10 10 10" position="0 0 0"></a-entity>
    </a-marker>

    <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
      <a-box position="0 0 -0.5" scale="0.1 0.1 0.5" color="red"></a-box>
    </a-marker>
   

    <a-entity camera></a-entity>
  </a-scene>
</body>
